<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lesson Viewer</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="graduate-cap.svg" type="image/svg+xml">
        <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="../assets/bootstrap/icons/bootstrap-icons.min.css">
    </head>
    <body>

        <!-- top menubar -->
        <header>
            <nav class="navbar fixed-top navbar-expand bg-body-secondary border-bottom border-1 border-dark py-0" style="height: 50px;">
                <div class="container-fluid px-2">

                    <!-- branding -->
                    <a class="navbar-brand m-0 p-0 me-3 d-flex align-items-center" href="#" title="Home">
                        <img src="graduate-cap.svg" height="38" alt="logo"> 
                    </a>

                    <!-- Menu items -->
                    <ul class="navbar-nav flex-row align-items-center me-auto">
                        <li class="nav-item dropdown">
                            <a class="nav-link px-2 py-1 text-decoration-none" 
                            href="#" 
                            role="button" 
                            data-bs-toggle="dropdown" 
                            aria-expanded="false">
                                File
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#offcanvasMenu" data-bs-toggle="offcanvas" role="button" aria-controls="offcanvasMenu">Show Lesson Menu</a></li>
                                <li><a class="dropdown-item" href="#">Exit Lesson</a></li>
                            </ul>
                        </li>
                    </ul>

                    <!-- Search -->
                    <form method="GET" class="d-flex ms-auto me-3 me-md-4" role="search">
                        <div class="input-group text-nowrap">
                            <input name="query" class="form-control form-control-sm searchquery" type="search" placeholder="Search lessons..." aria-label="Search" required/>
                            <button class="btn btn-outline-secondary btn-sm" type="submit">Go</button>
                        </div>
                    </form>

                    <!-- close button -->
                    <button type="button" class="btn-close me-1" aria-label="Close" onclick="closeApp()"></button>
                </div>
            </nav>
        </header>

         <!-- main content area -->
        <main class="container-fluid">

        </main>

        <!-- bottom status bar -->
        <footer>
            <nav class="navbar fixed-bottom bg-body-secondary border-top border-1 border-dark m-0 p-0" style="height: 40px;">

                <!-- status message -->
                <span id="statusmsg" class="navbar-text m-0 p-0 ms-2 small font-monospace"></span>

                <!-- progress bar -->
                <div id="progressbar" class="d-none progress progbar ms-2 border border-1 border-dark">
                    <div id="bar" class="progress-bar progress-bar-striped bg-primary" role="progressbar" style="width:46%" aria-value aria-valuemax="100">46%</div>
                </div>

                <!-- online status icons -->
                <div class="ms-auto m-0 p-0 me-1">
                    <button id="greenbtn" type="button" class="d-none btn btn-sm" title="Status: Online">🟢</button>
                    <button id="redbtn" type="button" class="btn btn-sm" title="Status: Offline">🔴</button>
                </div>

            </nav>
        </footer>

        <!-- modal -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
            <div class="offcanvas-header">
                <h3 class="offcanvas-title fw-bold" id="offcanvasMenuLabel">Lesson Menu</h3>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <div class="mb-3">
                    <div class="fw-bold text-secondary small">Current Class:</div>
                    <div class="fs-4">This is the Course Title</div>
                </div>
                <div class="accordion accordion-flush" id="lessonAccordion">
                    <div class="accordion-item" key="1">
                        <h2 class="accordion-header" id="heading-1">
                            <button type="button" data-bs-toggle="collapse" data-bs-target="#collapse-1" class="collapsed">
                                <span class="fw-bold">Lesson 1</span>
                                <small class="ms-2 text-muted">Lesson Title</small>
                            </button>
                        </h2>
                        <div id="collapse-1" class="accordion-collapse collapse" data-bs-parent="#lessonAccordion">
                            <div class="accordion-body p-2">
                                <ul class="list-unstyled mb-0">
                                    <li class="mb-1">Lesson Intro</li>
                                    <li key="1" class="mb-1">Page 1</li>
                                    <li class="mb-1">Quiz</li>
                                    <li class="mb-1">Answers</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-4 pt-3 border-top">
                    <ul class="list-unstyled">
                        <li class="mb-2">
                            <a href="#" class="btn btn-success btn-sm w-100" data-bs-dismiss="offcanvas">
                                <i class="bi bi-award me-2"></i>
                                View Certificate
                            </a>
                        </li>
                        <li>
                            <a href="#" class="btn btn-primary btn-sm w-100" data-bs-dismiss="offcanvas">
                                <i class="bi bi-trophy me-2"></i>
                                Completion Summary
                            </a>
                        </li>
                    </ul>
                </div>

            </div>
        </div>  

        <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
